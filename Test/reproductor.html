<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV+ | TV en Vivo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root {
            --primary-color: #e50914; /* Rojo */
            --bg-color: #141414;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin-top: 0; color: var(--primary-color); }
        
        #video-container {
            width: 100%;
            max-width: 600px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            position: relative;
        }
        video {
            width: 100%;
            display: block;
        }

        /* BOTÓN DINÁMICO ACESTREAM */
        #btn-acestream-launcher {
            display: none; /* Oculto por defecto */
            width: 100%;
            max-width: 600px;
            background-color: #1a1a1a;
            color: white;
            border: 2px solid var(--primary-color);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            text-decoration: none;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.2);
        }
        #btn-acestream-launcher:hover {
            background-color: var(--primary-color);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
        }
        #btn-acestream-launcher i {
            margin-right: 8px;
        }
        
        .controls-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: var(--primary-color); }
        
        #status {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
        }

        #lista-canales {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 850px;
        }
        .btn-canal {
            background-color: #333;
            color: white;
            border: 2px solid transparent;
            padding: 12px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn-canal:hover {
            background-color: var(--primary-color);
            transform: scale(1.05);
        }
        .btn-canal.active {
            background-color: var(--primary-color);
            border-color: white;
        }
    </style>
</head>
<body>

    <h2>TV+</h2>
    
    <div id="video-container">
        <video id="video" controls autoplay></video>
    </div>

    <a id="btn-acestream-launcher" href="#" target="_blank">
        <span style="color: #e50914;">▶</span> ABRIR EN ACESTREAM PLAYER
    </a>

    <div class="controls-container">
        <select id="filtro-categoria">
            <option value="">Cargando categorías...</option>
        </select>
        <div id="status">Cargando lista de canales...</div>
    </div>

    <div id="lista-canales">
        </div>

    <script>
        let player;
        let todosLosCanales = [];

        async function initApp() {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                document.getElementById('status').innerText = 'Tu navegador no soporta Shaka Player.';
                return;
            }

            const video = document.getElementById('video');
            player = new shaka.Player(video);
            player.addEventListener('error', onErrorEvent);

            await cargarJSON();
        }

        async function cargarJSON() {
            try {
                const urlJson = 'canales.json?nocache=' + new Date().getTime();
                const respuesta = await fetch(urlJson);
                
                if (!respuesta.ok) {
                    throw new Error('No se encontró el archivo JSON o hubo un error de red.');
                }
                
                todosLosCanales = await respuesta.json();
                
                document.getElementById('status').innerText = 'Esperando selección...';
                procesarCategorias();
            } catch (error) {
                console.error('Error al cargar canales.json:', error);
                document.getElementById('status').innerText = 'Error al cargar la lista de canales.';
            }
        }

        function procesarCategorias() {
            const select = document.getElementById('filtro-categoria');
            select.innerHTML = ''; 

            const categorias = [...new Set(todosLosCanales.map(c => c.categoria).filter(Boolean))];

            if (categorias.length === 0) {
                document.getElementById('status').innerText = 'No se encontraron categorías en el JSON.';
                return;
            }

            categorias.forEach(cat => {
                const opcion = document.createElement('option');
                opcion.value = cat;
                opcion.textContent = cat;
                select.appendChild(opcion);
            });

            select.addEventListener('change', (e) => renderizarBotones(e.target.value));
            renderizarBotones(categorias[0]);
        }

        function renderizarBotones(categoriaSeleccionada) {
            const contenedorLista = document.getElementById('lista-canales');
            contenedorLista.innerHTML = ''; 

            const canalesFiltrados = todosLosCanales.filter(c => c.categoria === categoriaSeleccionada);

            canalesFiltrados.forEach(canal => {
                const btn = document.createElement('button');
                btn.className = 'btn-canal';
                btn.innerText = canal.nombre;
                btn.onclick = (e) => {
                    document.querySelectorAll('.btn-canal').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    reproducirCanal(canal);
                };
                contenedorLista.appendChild(btn);
            });
        }

        async function reproducirCanal(canal) {
            const btnAcestream = document.getElementById('btn-acestream-launcher');
            const videoElement = document.getElementById('video');
            
            document.getElementById('status').innerText = 'Cargando: ' + canal.nombre + '...';

            // INTERCEPTOR DE PROTOCOLO ACESTREAM
            if (canal.url.toLowerCase().startsWith('acestream://')) {
                // Detener cualquier reproducción interna que esté ocurriendo
                try { await player.unload(); } catch(e){}
                videoElement.poster = ""; 
                
                // Configurar y mostrar el botón de lanzamiento de aplicación
                btnAcestream.href = canal.url;
                btnAcestream.style.display = 'block';
                btnAcestream.innerHTML = `<span style="color: #e50914; font-size:18px; margin-right:8px;">▶</span> ABRIR "${canal.nombre.toUpperCase()}" EN ACESTREAM`;
                
                document.getElementById('status').innerText = 'Enlace Acestream detectado. Usa el botón rojo para abrir.';
                return; // Cortamos la ejecución para que Shaka Player no intente procesarlo
            }

            // Si es un canal normal HTTP / M3U8 / MPD, volvemos a ocultar el botón especial
            btnAcestream.style.display = 'none';

            try {
                if (canal.kid && canal.key) {
                    const clearKeysConfig = {};
                    clearKeysConfig[canal.kid] = canal.key;
                    
                    player.configure({
                        drm: { clearKeys: clearKeysConfig }
                    });
                } else {
                    player.configure({
                        drm: { clearKeys: {} }
                    });
                }

                await player.load(canal.url);
                document.getElementById('status').innerText = 'Reproduciendo: ' + canal.nombre;
            } catch (e) {
                onError(e);
            }
        }

        function onErrorEvent(event) {
            onError(event.detail);
        }

        function onError(error) {
            console.error('Error Code:', error.code, 'Detalles:', error);
            document.getElementById('status').innerText = 'Error al reproducir el canal (CORS o enlace caído).';
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>

</body>
</html>
