<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV+ | TV en Vivo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root {
            --primary-color: #e50914; /* Rojo Acestream */
            --bg-color: #141414;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin-top: 0; color: var(--primary-color); letter-spacing: -1px; font-weight: 900; }
        
        #video-container {
            width: 100%;
            max-width: 600px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            position: relative;
        }
        video {
            width: 100%;
            display: block;
        }

        /* BOTÓN DINÁMICO REPRODUCTOR EXTERNO */
        #btn-acestream-launcher {
            display: none; /* Oculto por defecto */
            width: 100%;
            max-width: 600px;
            background-color: #1a1a1a;
            color: white;
            border: 2px solid var(--primary-color);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            text-decoration: none;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }
        #btn-acestream-launcher:hover {
            background-color: var(--primary-color);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.5);
        }
        
        .controls-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .select-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        select {
            padding: 10px;
            font-size: 14px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            font-weight: bold;
        }
        select:focus { border-color: var(--primary-color); }
        select:disabled { opacity: 0.4; cursor: not-allowed; }
        
        #status {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
        }

        #lista-canales {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 850px;
        }
        .btn-canal {
            background-color: #333;
            color: white;
            border: 2px solid transparent;
            padding: 12px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn-canal:hover {
            background-color: var(--primary-color);
            transform: scale(1.05);
        }
        .btn-canal.active {
            background-color: var(--primary-color);
            border-color: white;
        }
    </style>
</head>
<body>

    <h2>TV+ <span style="color:white; font-size:12px; font-weight:normal; vertical-align:middle; margin-left:5px; background:#222; padding:3px 7px; border-radius:4px; border:1px solid #333;">MULTIPLUG PLAYER</span></h2>
    
    <div id="video-container">
        <video id="video" controls autoplay></video>
    </div>

    <!-- Lanzador Externo Dinámico -->
    <a id="btn-acestream-launcher" href="#" target="_blank">
        ◀ ABRIR EN REPRODUCTOR EXTERNO ▶
    </a>

    <div class="controls-container">
        <div class="select-group">
            <select id="filtro-categoria">
                <option value="">Cargando categorías...</option>
            </select>
            
            <!-- NUEVO SELECTOR DE REPRODUCTOR -->
            <select id="selector-reproductor" disabled>
                <option value="acestream">🚀 App Oficial Acestream</option>
                <option value="vlc">🧡 VLC Media Player</option>
                <option value="mxplayer">🖤 MX Player (Android)</option>
            </select>
        </div>
        <div id="status">Cargando lista de canales...</div>
    </div>

    <div id="lista-canales"></div>

    <script>
        let player;
        let todosLosCanales = [];
        let canalSeleccionadoActivo = null;

        async function initApp() {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                document.getElementById('status').innerText = 'Tu navegador no soporta Shaka Player.';
                return;
            }

            const video = document.getElementById('video');
            player = new shaka.Player(video);
            player.addEventListener('error', onErrorEvent);

            // Escuchar cambios en el selector de reproductor para recalcular el link al vuelo
            document.getElementById('selector-reproductor').addEventListener('change', () => {
                if(canalSeleccionadoActivo) reproducirCanal(canalSeleccionadoActivo);
            });

            await cargarJSON();
        }

        async function cargarJSON() {
            try {
                const urlJson = 'canales.json?nocache=' + new Date().getTime();
                const respuesta = await fetch(urlJson);
                if (!respuesta.ok) throw new Error('Error de red al cargar JSON.');
                
                todosLosCanales = await respuesta.json();
                document.getElementById('status').innerText = 'Esperando selección...';
                procesarCategorias();
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = 'Error al cargar los canales.';
            }
        }

        function procesarCategorias() {
            const select = document.getElementById('filtro-categoria');
            select.innerHTML = ''; 
            const categorias = [...new Set(todosLosCanales.map(c => c.group || c.categoria).filter(Boolean))];

            if (categorias.length === 0) {
                document.getElementById('status').innerText = 'Sin categorías.';
                return;
            }

            categorias.forEach(cat => {
                const opcion = document.createElement('option');
                opcion.value = cat; opcion.textContent = cat;
                select.appendChild(opcion);
            });

            select.addEventListener('change', (e) => renderizarBotones(e.target.value));
            renderizarBotones(categorias[0]);
        }

        function renderizarBotones(categoriaSeleccionada) {
            const contenedorLista = document.getElementById('lista-canales');
            contenedorLista.innerHTML = ''; 
            const canalesFiltrados = todosLosCanales.filter(c => (c.group || c.categoria) === categoriaSeleccionada);

            canalesFiltrados.forEach(canal => {
                const btn = document.createElement('button');
                btn.className = 'btn-canal';
                btn.innerText = canal.nombre || canal.name;
                btn.onclick = (e) => {
                    document.querySelectorAll('.btn-canal').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    canalSeleccionadoActivo = canal;
                    reproducirCanal(canal);
                };
                contenedorLista.appendChild(btn);
            });
        }

        async function reproducirCanal(canal) {
            const btnLauncher = document.getElementById('btn-acestream-launcher');
            const selectRepro = document.getElementById('selector-reproductor');
            const videoElement = document.getElementById('video');
            const streamUrl = (canal.url || "").toLowerCase().trim();
            const nombreCanal = canal.nombre || canal.name || "Canal";
            
            const esAcestreamDirecto = streamUrl.startsWith('acestream://');
            const esAcestreamLocal = streamUrl.includes('6878/ace/') || streamUrl.includes('127.0.0.1') || streamUrl.includes('localhost');

            if (esAcestreamDirecto || (esAcestreamLocal && streamUrl.includes('id='))) {
                try { await player.unload(); } catch(e){}
                videoElement.poster = ""; 
                
                // Habilitamos el selector de reproductor
                selectRepro.disabled = false;
                
                // Extraer el ID puro de Acestream
                let acestreamID = canal.url;
                if (esAcestreamDirecto) {
                    acestreamID = canal.url.replace(/acestream:\/\//i, '');
                } else {
                    const idMatch = canal.url.match(/[?&]id=([^&]+)/i);
                    if (idMatch && idMatch[1]) acestreamID = idMatch[1];
                }

                // Obtener qué reproductor prefiere el usuario
                const reproductorElegido = selectRepro.value;
                let urlFinalLanzamiento = `acestream://${acestreamID}`;
                let textoBoton = `ABRIR EN APP ACESTREAM`;

                if (reproductorElegido === 'vlc') {
                    // Protocolo universal de VLC para móviles y PC
                    urlFinalLanzamiento = `vlc://${canal.url}`;
                    textoBoton = `ABRIR "${nombreCanal.toUpperCase()}" CON VLC PLAYER`;
                } else if (reproductorElegido === 'mxplayer') {
                    // Intent nativo para mandar el stream directamente a MX Player en Android
                    urlFinalLanzamiento = `intent:${canal.url}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(nombreCanal)};end`;
                    textoBoton = `ABRIR "${nombreCanal.toUpperCase()}" CON MX PLAYER`;
                } else {
                    textoBoton = `ABRIR "${nombreCanal.toUpperCase()}" CON APP ACESTREAM`;
                }
                
                btnLauncher.href = urlFinalLanzamiento;
                btnLauncher.style.display = 'block';
                btnLauncher.innerHTML = `<span style="color: #fff; font-size:16px; margin-right:8px;">▶</span> ${textoBoton}`;
                
                document.getElementById('status').innerText = `Modo externo activo. Selecciona tu reproductor favorito e inicia el botón rojo.`;
                return; 
            }

            // Si es un enlace HTTP/M3U8 normal, bloqueamos el selector externo y reproducimos dentro de la web
            selectRepro.disabled = true;
            btnLauncher.style.display = 'none';

            try {
                if (canal.kid && canal.key) {
                    const clearKeysConfig = {};
                    clearKeysConfig[canal.kid] = canal.key;
                    player.configure({ drm: { clearKeys: clearKeysConfig } });
                } else {
                    player.configure({ drm: { clearKeys: {} } });
                }

                await player.load(canal.url);
                document.getElementById('status').innerText = 'Reproduciendo internamente: ' + nombreCanal;
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = 'Error de carga en el reproductor interno web.';
            }
        }

        function onErrorEvent(event) { console.error(event.detail); }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
