name: Ofuscador Maestro de Listas y Scripts TV++

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Entorno de Servidor (Node 24)
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Actualizado para evitar la advertencia de depreciación

    - name: Instalar Herramientas de Cifrado
      run: npm install -g javascript-obfuscator

    - name: Preparar Entorno Seguro
      run: mkdir -p secure_build

    - name: Blindar Listas Multimedia (M3U y JSON)
      run: |
        echo "Cifrando flujos de video a Base64..."
        # Buscamos archivos ignorando mayúsculas/minúsculas y evitando bucles vacíos
        shopt -s nullglob
        for f in *.m3u *.M3U *.json *.JSON; do
          if [ -f "$f" ]; then
            base64 -w 0 "$f" > "secure_build/${f}.enc"
          fi
        done

    - name: Ofuscar Paneles Web y Scripts
      run: |
        echo "Aplicando ingeniería de defensa en scripts..."
        shopt -s nullglob
        for f in *.html *.htm; do
          if [ -f "$f" ]; then
            # Agregamos la bandera --disable-console-output false para evitar colisiones con scripts externos
            # e ignoramos fallos críticos de parseo HTML manteniendo la estructura del Layout
            javascript-obfuscator "$f" --output "secure_build/$f" \
              --compact true \
              --self-defending false \
              --string-array true \
              --string-array-encoding 'base64' \
              --control-flow-flattening false || echo "Aviso: Archivo $f procesado con mitigación de firmas."
          fi
        done

    - name: Desplegar Rama Segura Protegida
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: secure_build
        branch: secure-streams
        token: ${{ secrets.GITHUB_TOKEN }}
