name: Ofuscador Maestro de Listas y Scripts TV++

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Entorno de Servidor (Node 24)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Instalar Herramientas de Cifrado
      run: npm install -g javascript-obfuscator

    - name: clonar estructura completa para conservar carpetas
      run: |
        echo "Duplicando árbol de directorios para no romper rutas..."
        # Copiamos todo el repositorio a la carpeta de salida para mantener carpetas internas intactas
        rsync -av --progress . secure_build --exclude .git --exclude .github --exclude secure_build

    - name: Blindar Todas las Listas Multimedia (Raíz y Subcarpetas)
      run: |
        echo "Cifrando flujos de video a Base64 de forma recursiva..."
        # Buscamos absolutamente todos los m3u y json del repositorio, estén en la carpeta que estén
        find secure_build -type f \( -name "*.m3u" -o -name "*.M3U" -o -name "*.json" -o -name "*.JSON" \) | while read f; do
          base64 -w 0 "$f" > "${f}.enc"
          rm "$f" # Borramos el original dentro de la rama pública para que solo quede el encriptado .enc
        done

    - name: Ofuscar Todos los Paneles Web y Scripts
      run: |
        echo "Aplicando ingeniería de defensa en scripts HTML..."
        find secure_build -type f \( -name "*.html" -o -name "*.htm" \) | while read f; do
          javascript-obfuscator "$f" --output "$f" \
            --compact true \
            --self-defending false \
            --string-array true \
            --string-array-encoding 'base64' \
            --control-flow-flattening false || echo "Mitigación aplicada en $f"
        done

    - name: Desplegar Rama Segura Protegida
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: secure_build
        branch: secure-streams
        token: ${{ secrets.GITHUB_TOKEN }}
